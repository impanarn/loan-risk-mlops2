# params.yaml
data:
  raw_path: data/raw/loan_data.csv
  processed_path: data/processed/

model:
  type: lightgbm
  test_size: 0.2
  random_state: 42
  n_estimators: 200
  learning_rate: 0.05
  max_depth: 6
  num_leaves: 31
  min_child_samples: 20
  scale_pos_weight: 11

evaluate:
  threshold: 0.5
  metrics_path: reports/metrics.json